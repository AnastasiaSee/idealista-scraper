name: Run pipeline (no API)

on:
  schedule:
    - cron: "0 9 * * 1"  # each Monday at 09:00 UTC
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install pandas requests python-dotenv

      - name: Run pipeline (skip API)
        run: python -m src.main --no-api

      - name: Commit data changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          
          git add data/
          
          git diff --cached --quiet || git commit -m "Update processed data"
          git push